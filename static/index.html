<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morabaraba | AI Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="logo-icon">♟️</span>
                <h1>Morabaraba <span class="badge">AI</span></h1>
            </div>
            <div class="game-status" id="status-display">
                Ready to Start
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Left Panel: Stats -->
            <div class="panel side-panel">
                <div class="card p1-card active" id="p1-card">
                    <div class="player-info">
                        <h3>Player (White)</h3>
                        <div class="pieces-count">
                            <span id="p1-pieces">12</span> <small>left</small>
                        </div>
                        <div class="captured-count">
                            Lost: <span id="p1-captured">0</span>
                        </div>
                    </div>
                </div>

                <div class="card p2-card" id="p2-card">
                    <div class="player-info">
                        <h3>AI (Black)</h3>
                        <div class="pieces-count">
                            <span id="p2-pieces">12</span> <small>left</small>
                        </div>
                        <div class="captured-count">
                            Lost: <span id="p2-captured">0</span>
                        </div>
                    </div>
                </div>

                <div class="card phase-card">
                    <h4>Current Phase</h4>
                    <div class="phase-indicator" id="phase-indicator">PLACING</div>
                </div>
            </div>

            <!-- Center: Board -->
            <div class="board-container">
                <svg id="board-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
                    <!-- Board Lines -->
                    <g class="board-lines">
                        <!-- Outer Square -->
                        <rect x="50" y="50" width="700" height="700" class="line" />
                        <!-- Middle Square -->
                        <rect x="150" y="150" width="500" height="500" class="line" />
                        <!-- Inner Square -->
                        <rect x="250" y="250" width="300" height="300" class="line" />

                        <!-- Connecting Lines -->
                        <line x1="400" y1="50" x2="400" y2="250" class="line" />
                        <line x1="400" y1="550" x2="400" y2="750" class="line" />
                        <line x1="50" y1="400" x2="250" y2="400" class="line" />
                        <line x1="550" y1="400" x2="750" y2="400" class="line" />

                        <!-- Diagonals -->
                        <line x1="50" y1="50" x2="250" y2="250" class="line" />
                        <line x1="550" y1="550" x2="750" y2="750" class="line" />
                        <line x1="750" y1="50" x2="550" y2="250" class="line" />
                        <line x1="250" y1="550" x2="50" y2="750" class="line" />
                    </g>

                    <!-- Nodes (Clickable Areas) - Generated by JS -->
                    <g id="nodes-layer"></g>

                    <!-- Pieces Layer -->
                    <g id="pieces-layer"></g>
                </svg>
            </div>

            <!-- Right Panel: Controls & Log -->
            <div class="panel side-panel">
                <button id="btn-new-game" class="btn-primary">New Game vs AI</button>

                <div class="history-log">
                    <h4>Move History</h4>
                    <ul id="move-list">
                        <!-- Moves go here -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Overlay -->
    <div id="toast" class="toast hidden">Game Started</div>

    <script src="game.js"></script>
</body>

</html>
